name: branch-promotion

on:
  pull_request:
    branches:
      - dev
      - main
      - stage

jobs:
  validate-branch-promotion:
    name: validate-branch-promotion
    runs-on: ubuntu-latest

    steps:
      - name: Validate allowed source branch
        shell: pwsh
        run: |
          $baseRef = "${{ github.base_ref }}"
          $headRef = "${{ github.head_ref }}"

          Write-Host "Validating pull request source branch '$headRef' for target '$baseRef'."

          if ($headRef -eq "main") {
              Write-Error "Pull requests cannot originate from 'main'."
          }

          if ($baseRef -eq "main" -and $headRef -ne "stage") {
              Write-Error "Pull requests into 'main' must come from 'stage'."
          }

          if ($baseRef -eq "stage" -and $headRef -ne "dev") {
              Write-Error "Pull requests into 'stage' must come from 'dev'."
          }

          if ($headRef -eq "stage" -and $baseRef -ne "main") {
              Write-Error "Pull requests from 'stage' must target 'main'."
          }

          if ($headRef -eq "dev" -and $baseRef -ne "stage") {
              Write-Error "Pull requests from 'dev' must target 'stage'."
          }

          if ($baseRef -eq "dev" -and $headRef -in @("main", "stage")) {
              Write-Error "Pull requests into 'dev' cannot come from 'main' or 'stage'."
          }
